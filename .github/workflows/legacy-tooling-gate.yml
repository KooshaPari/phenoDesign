name: Legacy Tooling Gate (WARN Mode)

on:
  push:
    branches:
    - main
    - master
    - develop
  pull_request:
    branches:
    - main
    - master
  workflow_dispatch: null
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  legacy-tooling-scan:
    name: Legacy Tooling Anti-Pattern Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
    - name: Checkout phenotype/repos for shared tools
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
      with:
        repository: kooshapari/phenotype
        path: phenotype-repos
        sparse-checkout: tooling/legacy-enforcement
    - name: Set up Python
      uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48 # v-latest
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: pip install pyyaml
    - name: Run Legacy Tooling Scanner (WARN Mode)
      run: "python3 phenotype-repos/tooling/legacy-enforcement/scanner/legacy_tooling_scanner.py\
        \ \\\n  --repo-root . \\\n  --policy phenotype-repos/tooling/legacy-enforcement/policy/rules.yaml\
        \ \\\n  --output-json legacy_tooling_report.json \\\n  --output-md legacy_tooling_report.md\
        \ \\\n  --report-only\n"
      continue-on-error: true
    - name: Upload scan report (JSON)
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v-latest
      with:
        name: legacy-tooling-report-json
        path: legacy_tooling_report.json
        retention-days: 30
    - name: Upload scan report (Markdown)
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v-latest
      with:
        name: legacy-tooling-report-md
        path: legacy_tooling_report.md
        retention-days: 30
    - name: Comment PR with findings
      if: github.event_name == 'pull_request'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v-latest
      with:
        script: "const fs = require('fs');\nlet report = '**Legacy Tooling Scan Report**\\\
          n\\n';\n\ntry {\n  const data = JSON.parse(fs.readFileSync('legacy_tooling_report.json',\
          \ 'utf8'));\n  const totals = data.totals || {};\n\n  report += `| Severity\
          \ | Count |\\n|----------|-------|\\n`;\n  report += `| Critical | ${totals.critical\
          \ || 0} |\\n`;\n  report += `| High | ${totals.high || 0} |\\n`;\n  report\
          \ += `| Medium | ${totals.medium || 0} |\\n`;\n  report += `| Low | ${totals.low\
          \ || 0} |\\n\\n`;\n\n  const findings = data.findings || [];\n  if (findings.length\
          \ > 0) {\n    report += '**Top Violations:**\\n';\n    findings.slice(0,\
          \ 5).forEach(f => {\n      report += `- [${f.severity.toUpperCase()}] ${f.rule_id}:\
          \ ${f.file}:${f.line}\\n`;\n    });\n    if (findings.length > 5) {\n  \
          \    report += `- ... and ${findings.length - 5} more\\n`;\n    }\n  } else\
          \ {\n    report += 'No violations detected.\\n';\n  }\n\n  report += '\\\
          n*This is a WARN-mode scan. Fix before strict enforcement begins.*';\n}\
          \ catch (e) {\n  report += 'Could not parse scan results.';\n}\n\ngithub.rest.issues.createComment({\n\
          \  issue_number: context.issue.number,\n  owner: context.repo.owner,\n \
          \ repo: context.repo.repo,\n  body: report\n});\n"

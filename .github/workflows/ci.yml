name: CI

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
jobs:
  verify-archive:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
    - name: Verify archived status
      run: 'test -f ARCHIVED.md

        echo "Repository archived on $(grep ''Archived on'' ARCHIVED.md | cut -d''
        '' -f3)"

        '
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


name: Security Scan

on:
  push:
    branches:
    - main
    - master
  pull_request:
    branches:
    - main
    - master
  schedule:
  - cron: 0 2 * * *
  workflow_dispatch: null
  security-events: write
  actions: read
env: null
jobs:
  secrets:
    name: Secret Detection
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
      with:
        fetch-depth: 0
    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        args: --verbose --redact
      contents: read
      actions: read
  sast:
    name: SAST Analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
    - name: Setup Node
      uses: actions/setup-node@0355742c943ddb13ca8a6b700f824231caa91e75 # v-latest
      with:
        node-version: '20'
    - name: Install dependencies
      run: npm ci
    - name: Run ESLint Security
      run: npx eslint . --ext .ts,.tsx --config .eslintrc.security.js || true
    - name: Run Semgrep
      uses: returntocorp/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d
      with:
        config: 'p/typescript

          p/security-audit

          p/secrets

          '
        generateSarif: '1'
  dependencies:
    name: Dependency Audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
    - name: Setup Node
      uses: actions/setup-node@0355742c943ddb13ca8a6b700f824231caa91e75 # v-latest
      with:
        node-version: '20'
    - name: Install dependencies
      run: npm ci
    - name: Run npm audit
      run: npm audit --audit-level=high
      contents: read
      actions: read
  container:
    name: Container Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: ${{ hashFiles('Dockerfile') != '' }}
    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
    - name: Build image
      run: docker build -t ${{ github.event.repository.name }}:scan .
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@bfa4b33a029b9aa80ddb784b45574c30e072c59e # v-latest
      with:
        image-ref: ${{ github.event.repository.name }}:scan
        format: sarif
        output: trivy-results.sarif
    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@0daab03d71ff584ef619d027a3fd9146679c5d84
      if: always()
      with:
        sarif_file: trivy-results.sarif
      contents: read
      actions: read
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

